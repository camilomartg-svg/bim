<!DOCTYPE html>
<html lang="es" class="">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Iniciar Sesión - nora</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#171717",
                        "background-light": "#F3F4F6",
                        "background-dark": "#111827",
                        "text-light": "#1F2937",
                        "text-dark": "#F9FAFB"
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                },
            },
        };
    </script>
    <!-- MSAL.js para autenticación con Azure AD -->
    <script src="https://alcdn.msauth.net/browser/2.14.2/js/msal-browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
</head>
<body class="bg-white dark:bg-background-dark font-display text-text-light dark:text-text-dark antialiased">
    
    <div class="flex min-h-screen">
        
        <!-- Panel Izquierdo (Imagen y Branding) -->
        <div class="hidden lg:flex lg:w-1/2 relative bg-gray-900">
            <!-- Capa de imagen de fondo -->
            <div id="left-panel-bg" class="absolute inset-0 bg-cover bg-center transition-all duration-700 ease-in-out"></div>
            <!-- Capa oscura/gradiente superpuesta para resaltar el logo -->
            <div class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center">
                <!-- Logo Blanco NORA -->
                <img alt="nora logo" class="w-64 drop-shadow-lg" src="https://i.postimg.cc/rzpVzNDL/LOGO-NORA-BLANCO.png"/>
            </div>
        </div>

        <!-- Panel Derecho (Formulario de Login) -->
        <div class="w-full lg:w-1/2 flex items-center justify-center p-8 sm:p-12 lg:p-24 bg-white dark:bg-gray-900 transition-colors duration-300">
            <div class="w-full max-w-md">
                
                <!-- Logo visible solo en móviles -->
                <div class="lg:hidden flex justify-center mb-10">
                    <img alt="nora logo" class="h-16 dark:hidden" src="https://i.postimg.cc/hPxYkdvL/LOGO-NORA-NEGRO-VERTICAL.png"/>
                    <img alt="nora logo" class="h-16 hidden dark:block" src="https://i.postimg.cc/rzpVzNDL/LOGO-NORA-BLANCO.png"/>
                </div>

                <h2 class="text-3xl font-bold mb-2">Bienvenido a nora</h2>
                <p class="text-gray-500 dark:text-gray-400 mb-8">Ingresa tus datos para acceder a la plataforma.</p>

                <!-- Formulario Visual (Aún no funcional) -->
                <form id="traditional-login-form" class="space-y-5" onsubmit="event.preventDefault();">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Correo electrónico</label>
                        <input type="email" id="email" name="email" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-800 focus:ring-2 focus:ring-primary focus:border-primary transition duration-200" placeholder="tu@correo.com">
                    </div>
                    
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Contraseña</label>
                            <a href="#" class="text-sm text-gray-500 hover:text-primary dark:hover:text-white transition duration-200">¿Olvidaste tu contraseña?</a>
                        </div>
                        <input type="password" id="password" name="password" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-800 focus:ring-2 focus:ring-primary focus:border-primary transition duration-200" placeholder="••••••••">
                    </div>

                    <div class="flex items-center">
                        <input type="checkbox" id="keep-signed-in" class="form-checkbox h-5 w-5 text-primary rounded border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-primary cursor-pointer">
                        <label for="keep-signed-in" class="ml-3 text-sm text-gray-600 dark:text-gray-300 cursor-pointer">Mantener la sesión iniciada</label>
                    </div>

                    <button type="button" class="w-full bg-primary hover:bg-black dark:bg-white dark:hover:bg-gray-200 dark:text-black text-white font-bold py-3 px-4 rounded-lg shadow-md transition duration-300 flex justify-center items-center">
                        Iniciar Sesión
                    </button>
                </form>

                <!-- Separador -->
                <div class="mt-8 mb-8 flex items-center">
                    <div class="flex-grow border-t border-gray-300 dark:border-gray-700"></div>
                    <span class="flex-shrink-0 mx-4 text-sm text-gray-400">O continuar con</span>
                    <div class="flex-grow border-t border-gray-300 dark:border-gray-700"></div>
                </div>

                <!-- Botones Sociales -->
                <div class="space-y-4">
                    <!-- Botón Funcional de Microsoft -->
                    <button id="login-button" class="w-full flex items-center justify-center bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 font-semibold py-3 px-4 rounded-lg border border-gray-300 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 shadow-sm transition duration-300">
                        <svg class="w-6 h-6 mr-3" viewBox="0 0 24 24" fill="currentColor" style="color: #00a4ef;">
                            <path d="M11.4 24H0V12.6h11.4V24zM24 24H12.6V12.6H24V24zM11.4 11.4H0V0h11.4v11.4zm12.6 0H12.6V0H24v11.4z"/>
                        </svg>
                        Microsoft
                    </button>

                    <!-- Botón Visual de Google -->
                    <button type="button" class="w-full flex items-center justify-center bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 font-semibold py-3 px-4 rounded-lg border border-gray-300 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 shadow-sm transition duration-300">
                        <svg class="w-6 h-6 mr-3" viewBox="0 0 24 24" fill="currentColor">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Google
                    </button>

                    <!-- Botón de Otro Usuario -->
                    <button id="switch-user-button" class="w-full flex items-center justify-center bg-transparent text-gray-500 dark:text-gray-400 font-medium py-3 px-4 hover:text-primary dark:hover:text-white transition duration-300">
                        <span class="material-symbols-outlined mr-2 text-xl">swap_horiz</span>
                        Iniciar con otro usuario (Microsoft)
                    </button>
                </div>

                <div id="error-message" class="mt-4 text-red-500 text-sm text-center font-medium"></div>

                <!-- Footer del formulario -->
                <p class="mt-8 text-center text-sm text-gray-500 dark:text-gray-400">
                    ¿No tienes una cuenta? <a href="#" class="font-semibold text-primary dark:text-white hover:underline">Regístrate</a>
                </p>
                <div class="mt-4 text-center">
                    <a href="https://camilomartg-svg.github.io/bim/home.html" class="text-xs text-gray-400 hover:text-primary dark:hover:text-white transition duration-200">Volver a la página principal</a>
                </div>

            </div>
        </div>
    </div>

    <script>
        // --- ROTACIÓN DE IMAGEN DE FONDO ---
        const bgImages = [
            'https://i.postimg.cc/gjdf4ybv/1bed16470705aeff4a1bf5c9d6a4d92d.jpg',
            'https://i.postimg.cc/Y0kJ8NBF/6fe9d33bfb28fcbe8acc5d8450198ace.jpg',
            'https://i.postimg.cc/br8KL0fS/9ac65d507569e6a578661338b7cf711c.jpg',
            'https://i.postimg.cc/WzjQSmcm/a4914f0568cbc13fb185237cab88c64e.jpg',
            'https://i.postimg.cc/x8YWgGVJ/d603ef667ae6d6d62abfa6e52e31e819.jpg',
            'https://i.postimg.cc/nrZ6TKfG/dfde730b8f85a5ed6a558a6d216008a3.jpg',
            'https://i.postimg.cc/T1GZQjvW/e1c05af2d2065ca689c71c6a36dae203.jpg'
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const leftPanel = document.getElementById('left-panel-bg');
            if (leftPanel) {
                const randomImg = bgImages[Math.floor(Math.random() * bgImages.length)];
                leftPanel.style.backgroundImage = `url('${randomImg}')`;
            }

            // GESTIÓN DEL TEMA (MODO OSCURO/CLARO)
            const htmlEl = document.documentElement;
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                htmlEl.classList.add('dark');
            }
        });

        // --- LÓGICA DE INICIO DE SESIÓN CON MICROSOFT (MSAL) ---
        const loginButton = document.getElementById('login-button');
        const switchUserButton = document.getElementById('switch-user-button');
        const errorMessage = document.getElementById('error-message');
        const keepSignedInCheckbox = document.getElementById('keep-signed-in');

        async function handleLogin(forceAccountSelection = false) {
            try {
                errorMessage.textContent = "";
                const cacheLocation = keepSignedInCheckbox.checked ? "localStorage" : "sessionStorage";
                
                const msalConfig = {
                    auth: {
                        clientId: "084a9828-6166-4fef-b012-b2bafbececdf", 
                        authority: "https://login.microsoftonline.com/common",
                        redirectUri: window.location.href,
                    },
                    cache: {
                        cacheLocation: cacheLocation,
                        storeAuthStateInCookie: false,
                    }
                };

                const msalInstance = new msal.PublicClientApplication(msalConfig);

                if (forceAccountSelection) {
                    sessionStorage.removeItem('userAccount');
                    localStorage.removeItem('userAccount');
                }

                await msalInstance.loginPopup({
                    scopes: ["User.Read"],
                    prompt: forceAccountSelection ? "select_account" : undefined
                });

                const account = msalInstance.getAllAccounts()[0];

                if (account) {
                    const ROLES_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx4NEpE6EyrC2ggk8To0F0TP5P9y0YnaxiWzCbcIhSR7-KRSy4Wu0PM9hYyNY5y72Q/exec';
                    let userRole = null;
                    const normalizedAccountEmail = account.username.trim().toLowerCase();

                    if (normalizedAccountEmail === 'alcabama.bim@outlook.com') {
                        userRole = 'ADMINISTRADOR';
                    } else {
                        try {
                            const response = await fetch(ROLES_SCRIPT_URL);
                            const rolesList = await response.json();
                            const userData = rolesList.find(u => u.email && u.email.trim().toLowerCase() === normalizedAccountEmail);
                            if (userData) {
                                userRole = userData.rol;
                            }
                        } catch (error) {
                            console.error("Error al obtener la lista de roles:", error);
                        }
                    }

                    const userProfile = {
                        name: account.name,
                        username: account.username,
                        role: userRole
                    };                    

                    if (keepSignedInCheckbox.checked) {
                        localStorage.setItem('userAccount', JSON.stringify(userProfile));
                    } else {
                        sessionStorage.setItem('userAccount', JSON.stringify(userProfile));
                    }

                    window.location.href = 'https://camilomartg-svg.github.io/bim/home.html';
                }
            } catch (error) {
                console.error(error);
                errorMessage.textContent = "Error al iniciar sesión. Por favor, inténtalo de nuevo.";
            }
        }

        if (loginButton) loginButton.addEventListener('click', () => handleLogin(false));
        if (switchUserButton) switchUserButton.addEventListener('click', () => handleLogin(true));
    </script>
</body>
</html>
