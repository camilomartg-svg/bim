<body class="bg-background-light dark:bg-background-dark text-text-light dark:text-text-dark">

                    class="rounded-md bg-white px-4 py-2 text-xs font-black uppercase tracking-widest text-[#111827]">Actualizar</button>
            </div>
        </div>
        <header class="absolute top-0 left-0 w-full z-10 px-8 py-4">

                <div class="flex items-center space-x-4">

                    <div id="auth-container" class="flex items-center space-x-4"><a
                            href="https://norabim.com/inse.html"

                            sesión</a></div>
                </div>
            </div>
        </header>
        <main>
            <section class="relative flex h-80 pt-24 overflow-hidden">
                <!-- Panel Izquierdo (30%) con color sólido y logo -->
                <div class="w-[30%] bg-[#f6f6f6] dark:bg-background-dark h-full flex items-center justify-center p-8">
                    <a href="home.html" class="block w-full max-w-[200px]" title="Ir al Home">
                        <img id="portal-logo-light" alt="nora CDE" class="w-full h-auto object-contain dark:hidden"
                            src="https://i.postimg.cc/tR3YSryT/LOGO-NORA-NEGRO.png" />
                        <img id="portal-logo-dark" alt="nora CDE" class="w-full h-auto object-contain hidden dark:block"

                </div>
                <!-- Panel Derecho (70%) con imagen -->

                </div>
            </section>
            <section class="bg-[#f2f2f2] dark:bg-background-dark py-16 px-8">
                <div class="container mx-auto">
                    <div class="flex flex-col xl:flex-row gap-8 items-start">
                        
                        <!-- Columna Izquierda: Menús (Cuadros Negros) -->
                        <div class="w-full xl:w-[35%] flex flex-col gap-6">
                            <!-- Publicaciones -->
                            <div class="bg-[#1c1c1c] text-white p-8 rounded-[2rem] shadow-xl flex flex-col min-h-[320px] relative overflow-hidden group">
                                <div class="flex justify-between items-start mb-auto relative z-10">

                                </div>
                                <div class="relative z-10 mt-12">
                                    <h2 class="text-4xl font-semibold tracking-tight leading-none mb-6">Publica<br>ciones</h2>
                                    <ul class="space-y-3" id="portal-publicaciones-list"></ul>
                                </div>
                                <div class="absolute w-20 h-6 bg-[#ff4d00] rounded-full rotate-45 -top-4 left-1/3 opacity-80 group-hover:scale-150 transition-transform duration-500"></div>
                            </div>
                            <!-- Solicitudes -->
                            <div class="bg-[#1c1c1c] text-white p-8 rounded-[2rem] shadow-xl flex flex-col min-h-[320px] relative overflow-hidden group">
                                <div class="flex justify-between items-start mb-auto relative z-10">
                                    <span class="text-[10px] font-bold tracking-widest uppercase border border-white/20 px-4 py-1.5 rounded-full text-white/70">Sección 2</span>
                                    <span class="text-7xl font-light tracking-tighter text-white/90">02</span>
                                </div>
                                <div class="relative z-10 mt-12">
                                    <h2 class="text-4xl font-semibold tracking-tight leading-none mb-6">Solicitudes</h2>
                                    <ul class="space-y-3" id="portal-solicitudes-list"></ul>
                                </div>
                            </div>
                            <!-- Métricas -->
                            <div class="bg-[#1c1c1c] text-white p-8 rounded-[2rem] shadow-xl flex flex-col min-h-[320px] relative overflow-hidden group">
                                <div class="flex justify-between items-start mb-auto relative z-10">
                                    <span class="text-[10px] font-bold tracking-widest uppercase border border-white/20 px-4 py-1.5 rounded-full text-white/70">Sección 3</span>
                                    <span class="text-7xl font-light tracking-tighter text-white/90">03</span>
                                </div>

                                    <h2 class="text-4xl font-semibold tracking-tight leading-none mb-6">Métricas</h2>

                            <!-- Administración -->
                            <div id="portal-admin-column" class="bg-[#1c1c1c] text-white p-8 rounded-[2rem] shadow-xl flex-col min-h-[320px] relative overflow-hidden group hidden flex">
                                <div class="flex justify-between items-start mb-auto relative z-10">
                                    <span class="text-[10px] font-bold tracking-widest uppercase border border-white/20 px-4 py-1.5 rounded-full text-white/70">Sección 4</span>
                                    <span class="text-7xl font-light tracking-tighter text-white/90">04</span>
                                </div>
                                <div class="relative z-10 mt-12">
                                    <h2 class="text-4xl font-semibold tracking-tight leading-none mb-6">Adminis<br>tración</h2>
                                    <ul class="space-y-3" id="portal-admin-list"></ul>
                                </div>

                        </div>

                        <!-- Columna Derecha: Proyectos (Cuadros Blancos) -->
                        <div class="w-full xl:w-[65%]">
                            <div id="portal-projects-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6 items-start auto-rows-max">
                                <!-- Proyectos se insertan aquí vía JS -->
                            </div>
                        </div>

                    </div>
                </div>
            </section>
        </main>
        <footer class="bg-background-light dark:bg-background-dark py-8 px-8 mt-auto">
            <div class="container mx-auto text-center text-gray-500 dark:text-gray-400">
                <div class="flex items-center justify-center gap-4 mb-4">
                    
                    <!-- Logo para modo claro -->
                    <img id="portal-footer-logo-light" alt="Alcabama logo" class="h-40 dark:hidden"
                        src="https://i.postimg.cc/tR3YSryT/LOGO-NORA-NEGRO.png" />
                    <!-- Logo para modo oscuro -->
                    <img id="portal-footer-logo-dark" alt="Alcabama logo" class="h-40 hidden dark:block"
                        src="https://i.postimg.cc/SQ6JTZqj/LOGO-NORA-BLANCO.png" />
                </div>
                <p class="text-sm" id="portal-footer-text">© 2026 nora CDE - Todos los derechos reservados.
                </p>
            </div>
        </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const heroImage = document.getElementById('home-hero-image');
            const authContainer = document.getElementById('auth-container');
            const projectsList = document.getElementById('portal-projects-grid');
            const publicacionesList = document.getElementById('portal-publicaciones-list');
            const solicitudesList = document.getElementById('portal-solicitudes-list');
            const metricasList = document.getElementById('portal-metricas-list');
            const adminList = document.getElementById('portal-admin-list');
            const adminColumn = document.getElementById('portal-admin-column');
            const footerText = document.getElementById('portal-footer-text');
            // Buscar usuario en sessionStorage y luego en localStorage
            const userAccount = JSON.parse(sessionStorage.getItem('userAccount') || localStorage.getItem('userAccount'));
            const userRole = userAccount?.role || '';
            const DEFAULT_PORTAL_CONFIG = {
                portal: {
                    name: 'nora CDE',
                    shortName: 'Portal BIM',
                    footerText: '© 2026 nora CDE - Todos los derechos reservados.',
                    heroImages: [
                        'https://i.postimg.cc/fbwgkrDd/r-ciien.png',
                        'https://i.postimg.cc/FK9n1BNP/r-trevoly.png'
                    ],
                    configPageUrl: 'portal-configurator.html',
                    logoLight: 'https://i.postimg.cc/tR3YSryT/LOGO-NORA-NEGRO.png',
                    logoDark: 'https://i.postimg.cc/SQ6JTZqj/LOGO-NORA-BLANCO.png',
                    footerLogoLight: 'https://i.postimg.cc/tR3YSryT/LOGO-NORA-NEGRO.png',
                    footerLogoDark: 'https://i.postimg.cc/SQ6JTZqj/LOGO-NORA-BLANCO.png',
                    footerLogoSecondaryLight: 'https://i.postimg.cc/tR3YSryT/LOGO-NORA-NEGRO.png',
                    footerLogoSecondaryDark: 'https://i.postimg.cc/SQ6JTZqj/LOGO-NORA-BLANCO.png'
                },
                projects: [
                    { name: 'Arboré', homeUrl: '#', enabled: true },
                    { name: 'Blue', homeUrl: '', enabled: true },
                    { name: 'Ciudadela armonía', homeUrl: '#', enabled: true },
                    { name: 'Gardenias', homeUrl: '#', enabled: true },
                    { name: 'Iris', homeUrl: '#', enabled: true },
                    { name: 'La figeroa', homeUrl: '#', enabled: true },
                    { name: 'Madero', homeUrl: '#', enabled: true },
                    { name: 'Madrigal', homeUrl: '#', enabled: true },
                    { name: 'Magnolias', homeUrl: '#', enabled: true },
                    { name: 'Magnolias II', homeUrl: '#', enabled: true },
                    { name: 'Mirandé', homeUrl: '#', enabled: true },
                    { name: 'Orión', homeUrl: '#', enabled: true },
                    { name: 'Orión II', homeUrl: '#', enabled: true },
                    { name: 'Tierra Llana', homeUrl: '#', enabled: true },
                    { name: 'Trevoly', homeUrl: '', enabled: true },
                    { name: 'Ventura', homeUrl: '', enabled: true }
                ],
                publicaciones: [
                    {
                        id: 'link-publicaciones',
                        label: 'Publicaciones por proyecto',
                        href: 'https://norabim.com/Publicaciones.html',
                        allowedRoles: ['COMBOS Y REFORMAS', 'ACÚSTICA', 'ADMINISTRADOR']
                    }
                ],
                solicitudes: [
                    {
                        id: 'link-solicitud-cde',
                        label: 'Solicitud de acceso a CDE',
                        href: 'https://norabim.com/solicitudes.html',
                        allowedRoles: ['EDGE', 'COMBOS Y REFORMAS', 'ARQUITECTURA', 'ADMINISTRADOR']
                    },
                    {
                        id: 'link-admin-usuarios',
                        label: 'Administrar Usuarios',
                        href: 'https://norabim.com/addusuarios.html',
                        allowedRoles: ['ADMINISTRADOR']
                    },
                    {
                        id: 'link-lista-usuarios',
                        label: 'Lista Usuarios',
                        href: 'https://norabim.com/lista_usuarios.html',
                        allowedRoles: ['ADMINISTRADOR']
                    }
                ],
                metricas: [
                    { label: 'Auditorías', href: '#' },
                    { label: 'Incidencias', href: '#' },
                    { label: 'Seguimiento de proyectos', href: '#' }
                ],
                administracion: [
                    {
                        id: 'link-pba-config',
                        label: 'Configuración del CDE',
                        href: 'portal-configurator.html',
                        allowedRoles: ['ADMINISTRADOR']
                    }
                ]
            };

            const escapeHtml = (value) => String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
            const slugify = (value) => String(value ?? '')
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '') || 'proyecto';
            const canAccess = (item) => {
                if (userRole === 'ADMINISTRADOR') return true;
                const roles = Array.isArray(item?.allowedRoles) ? item.allowedRoles : [];
                return roles.length === 0 || (userRole && roles.includes(userRole));
            };
            const resolveProjectHref = (project) => {
                if (!project || project.enabled === false) return '#';
                const slug = slugify(project.slug || project.name || '');
                const landingEnabled = !project.landing || project.landing.enabled !== false;
                
                const urlParams = new URLSearchParams(window.location.search);
                const empresaId = urlParams.get('empresa');
                const empresaParam = empresaId ? `&empresa=${encodeURIComponent(empresaId)}` : '';

                if (landingEnabled && slug) return `project-landing.html?project=${encodeURIComponent(slug)}${empresaParam}`;
                const rawUrl = String(project.homeUrl || '').trim();
                return rawUrl || '#';
            };
            const renderLinkItems = (listEl, items) => {
                if (!listEl) return;
                const visibleItems = (Array.isArray(items) ? items : []).filter(canAccess);
                listEl.innerHTML = visibleItems.length
                    ? visibleItems
                        .map((item) => `<li id="${escapeHtml(item.id || '')}"><a class="flex items-center gap-2 text-white/70 hover:text-white text-sm font-medium transition-colors duration-200" href="${escapeHtml(item.href || '#')}"><span class="material-symbols-outlined text-[16px]">arrow_forward</span>${escapeHtml(item.label || 'Sin nombre')}</a></li>`)
                        .join('')
                    : '<li class="text-xs tracking-wider uppercase font-bold text-white/30">Sin enlaces configurados</li>';
            };
            const renderProjects = (projects) => {
                if (!projectsList) return;
                const visibleProjects = (Array.isArray(projects) ? projects : []).filter((item) => item && item.enabled !== false);
                projectsList.innerHTML = visibleProjects.length
                    ? visibleProjects
                        .map((project, index) => {
                            const numberStr = (index + 1).toString().padStart(2, '0');
                            const fact1 = Math.floor(Math.random() * 30) + 5;
                            const fact2 = Math.floor(Math.random() * 50) + 10;
                            return `
                            <a href="${escapeHtml(resolveProjectHref(project))}" class="group flex flex-col bg-white dark:bg-[#374151] rounded-[2rem] p-8 shadow-md hover:shadow-2xl transition-all duration-300 relative overflow-hidden h-full border border-gray-100 dark:border-gray-700">
                                <div class="flex justify-between items-start mb-12 relative z-10">
                                    <span class="text-[10px] font-bold tracking-widest uppercase border border-gray-300 dark:border-gray-600 px-4 py-1.5 rounded-full text-gray-500 dark:text-gray-400 flex items-center gap-1">
                                        <span class="material-symbols-outlined text-[12px]">folder_open</span> PROYECTO
                                    </span>
                                    <span class="w-10 h-10 rounded-full border border-gray-200 dark:border-gray-700 flex items-center justify-center text-gray-400 group-hover:bg-[#171717] group-hover:text-white group-hover:border-[#171717] transition-all duration-300 -rotate-45 group-hover:rotate-0">
                                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
                                    </span>
                                </div>
                                <h3 class="text-[2.5rem] font-medium tracking-tight text-[#111] dark:text-white leading-[1.1] mb-6 relative z-10">${escapeHtml(project.name || 'Proyecto')}</h3>
                                <p class="text-sm text-gray-500 dark:text-gray-400 mb-10 leading-relaxed max-w-[90%] relative z-10">Accede al entorno de datos comunes de este proyecto para interactuar con los modelos y toda la documentación relacionada.</p>
                                
                                <div class="mt-auto flex gap-4 relative z-10">
                                    <div class="bg-[#f8f8f8] dark:bg-gray-800 rounded-xl px-4 py-3 flex-1 flex flex-col items-center justify-center border border-gray-100 dark:border-gray-700">
                                        <div class="text-[10px] text-gray-400 dark:text-gray-500 font-bold uppercase tracking-wider mb-1">Modelos</div>
                                        <div class="text-2xl font-light tracking-tighter text-gray-800 dark:text-gray-300">${fact1}</div>
                                    </div>
                                    <div class="bg-[#f8f8f8] dark:bg-gray-800 rounded-xl px-4 py-3 flex-1 flex flex-col items-center justify-center border border-gray-100 dark:border-gray-700">
                                        <div class="text-[10px] text-gray-400 dark:text-gray-500 font-bold uppercase tracking-wider mb-1">Planos</div>
                                        <div class="text-2xl font-light tracking-tighter text-gray-800 dark:text-gray-300">${fact2}</div>
                                    </div>
                                </div>
                                <div class="absolute -bottom-8 -right-4 text-[10rem] leading-none font-black text-gray-50 dark:text-gray-800/30 z-0 select-none group-hover:scale-110 transition-transform duration-500">${numberStr}</div>
                            </a>
                        `})
                        .join('')
                    : '<div class="col-span-full text-center py-12 text-gray-500">Sin proyectos configurados.</div>';
            };
            const applyHeroImages = (images) => {
                const heroImages = (Array.isArray(images) ? images : []).filter(Boolean);
                if (!heroImage || heroImages.length === 0) return;
                const selectedImage = heroImages[Math.floor(Math.random() * heroImages.length)];
                heroImage.style.backgroundImage = `url('${selectedImage}')`;
            };
            const applyPortalConfig = (config) => {
                const safeConfig = config && typeof config === 'object' ? config : DEFAULT_PORTAL_CONFIG;
                document.title = safeConfig.portal?.name || 'nora CDE';
                if (footerText && safeConfig.portal?.footerText) {
                    footerText.textContent = safeConfig.portal.footerText;
                }

                // Actualizar logos dinámicamente
                const logoLight = safeConfig.portal?.logoLight || 'https://i.postimg.cc/tR3YSryT/LOGO-NORA-NEGRO.png';
                const logoDark = safeConfig.portal?.logoDark || 'https://i.postimg.cc/SQ6JTZqj/LOGO-NORA-BLANCO.png';
                const footerLogoLight = safeConfig.portal?.footerLogoLight || 'https://i.postimg.cc/tR3YSryT/LOGO-NORA-NEGRO.png';
                const footerLogoDark = safeConfig.portal?.footerLogoDark || 'https://i.postimg.cc/SQ6JTZqj/LOGO-NORA-BLANCO.png';
                const footerLogoSecondaryLight = safeConfig.portal?.footerLogoSecondaryLight || 'https://i.postimg.cc/tR3YSryT/LOGO-NORA-NEGRO.png';
                const footerLogoSecondaryDark = safeConfig.portal?.footerLogoSecondaryDark || 'https://i.postimg.cc/SQ6JTZqj/LOGO-NORA-BLANCO.png';

                const imgLogoLight = document.getElementById('portal-logo-light');
                if (imgLogoLight) imgLogoLight.src = logoLight;
                const imgLogoDark = document.getElementById('portal-logo-dark');
                if (imgLogoDark) imgLogoDark.src = logoDark;
                const imgFooterLight = document.getElementById('portal-footer-logo-light');
                if (imgFooterLight) imgFooterLight.src = footerLogoLight;
                const imgFooterDark = document.getElementById('portal-footer-logo-dark');
                if (imgFooterDark) imgFooterDark.src = footerLogoDark;
                const imgFooterSecondaryLight = document.getElementById('portal-footer-logo-secondary-light');
                if (imgFooterSecondaryLight) imgFooterSecondaryLight.src = footerLogoSecondaryLight;
                const imgFooterSecondaryDark = document.getElementById('portal-footer-logo-secondary-dark');
                if (imgFooterSecondaryDark) imgFooterSecondaryDark.src = footerLogoSecondaryDark;

                renderProjects(safeConfig.projects);
                renderLinkItems(publicacionesList, safeConfig.publicaciones);
                renderLinkItems(solicitudesList, safeConfig.solicitudes);
                renderLinkItems(metricasList, safeConfig.metricas);
                const adminItems = (Array.isArray(safeConfig.administracion) ? safeConfig.administracion : []).filter(canAccess);
                if (adminColumn) {
                    if (adminItems.length) {
                        adminColumn.classList.remove('hidden');
                        adminColumn.classList.add('flex');
                        renderLinkItems(adminList, adminItems);
                    } else {
                        adminColumn.classList.add('hidden');
                    }
                }
                applyHeroImages(safeConfig.portal?.heroImages);
            };
            const loadPortalConfig = async () => {
                try {
                    // 1. Intentar cargar de la red primero (mostrar la última versión si hay conexión)
                    const metaVersion = document.querySelector('meta[name="x-app-version"]');
                    const currentVersion = metaVersion?.getAttribute('content') || Date.now().toString();
                    
                    const urlParams = new URLSearchParams(window.location.search);
                    const empresaId = urlParams.get('empresa');
                    let configUrl = `portal-config.json?v=${encodeURIComponent(currentVersion)}`;
                    
                    if (empresaId) {
                        try {
                            const empRes = await fetch('empresas.json');
                            if (empRes.ok) {
                                const empresas = await empRes.json();
                                const emp = empresas.find(e => e.id === empresaId);
                                if (emp && emp.configUrl) {
                                    configUrl = `${emp.configUrl}?v=${encodeURIComponent(currentVersion)}`;
                                }
                            }
                        } catch(e) {
                            console.warn('Error cargando empresas.json', e);
                        }
                    }

                    const response = await fetch(configUrl, { cache: 'no-store' });
                    if (!response.ok) throw new Error('No se pudo cargar la configuracion central');
                    const config = await response.json();
                    applyPortalConfig({ ...DEFAULT_PORTAL_CONFIG, ...config });
                } catch (error) {
                    console.warn('Error al cargar configuración central de red. Intentando borrador local...', error);
                    // 2. Si no hay conexión o falla, intentar cargar el borrador local (buffer)
                    try {
                        const draft = localStorage.getItem('portal:pba-config-draft:v2');
                        if (draft) {
                            console.log('Cargando borrador local de configuración (buffer)');
                            const config = JSON.parse(draft);
                            applyPortalConfig({ ...DEFAULT_PORTAL_CONFIG, ...config });
                            return;
                        }
                    } catch (e) {
                        console.warn('Error al leer borrador local:', e);
                    }
                    // 3. Fallback final por defecto
                    applyPortalConfig(DEFAULT_PORTAL_CONFIG);
                }
            };
            void loadPortalConfig();

            // --- GESTIÓN DE AUTENTICACIÓN ---
            if (userAccount) {
                authContainer.innerHTML = `
                <span class="text-sm font-medium text-text-light dark:text-white">Hola, ${userAccount.name.split(' ')[0]}</span>
                <button id="logout-button" class="text-text-light dark:text-white hover:text-primary text-sm font-medium">Cerrar sesión</button>
            `;
                document.getElementById('logout-button').addEventListener('click', () => {
                    sessionStorage.removeItem('userAccount'); // Limpiar ambas ubicaciones
                    localStorage.removeItem('userAccount');
                    window.location.reload();
                });
            }

            // --- CONTROL DE ACCESO POR USUARIO ---
            if (userAccount) {
                console.log('User role:', userRole);
            } else {
                if (adminColumn) adminColumn.classList.add('hidden');
            }

            // --- GESTIÓN DEL TEMA (MODO OSCURO/CLARO) ---
            const themeToggle = document.getElementById('theme-toggle');
            const htmlEl = document.documentElement;

            const applyTheme = (theme) => {
                if (theme === 'dark') {
                    htmlEl.classList.add('dark');
                    themeToggle.querySelector('.material-symbols-outlined').textContent = 'light_mode';
                } else {
                    htmlEl.classList.remove('dark');
                    themeToggle.querySelector('.material-symbols-outlined').textContent = 'dark_mode';
                }
            };

            const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            applyTheme(savedTheme);

            themeToggle.addEventListener('click', () => {
                const newTheme = htmlEl.classList.contains('dark') ? 'light' : 'dark';
                localStorage.setItem('theme', newTheme);
                applyTheme(newTheme);
            });

            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    const meta = document.querySelector('meta[name="x-app-version"]');
                    const appVersion = meta?.getAttribute('content') || '';
                    const swUrl = appVersion ? `sw.js?v=${encodeURIComponent(appVersion)}` : 'sw.js';
                    navigator.serviceWorker.register(swUrl)
                        .then(registration => {
                            console.log('ServiceWorker registrado con éxito:', registration.scope);
                        })
                        .catch(error => {
                            console.log('Fallo en el registro de ServiceWorker:', error);
                        });
                });
            }

            const backBtn = document.getElementById('back-btn');
            backBtn?.addEventListener('click', () => {
                if (window.history.length > 1) window.history.back();
                else window.location.href = 'home.html';
            });

            const metaVersion = document.querySelector('meta[name="x-app-version"]');
            const appId = metaVersion?.getAttribute('data-app') || 'portal';
            const currentVersion = metaVersion?.getAttribute('content') || '';
            const versionKey = `${appId}:appVersion`;
            const storedVersion = localStorage.getItem(versionKey) || '';
            const banner = document.getElementById('update-banner');
            const reloadBtn = document.getElementById('update-reload');
            const showBanner = () => {
                if (!banner) return;
                banner.classList.remove('hidden');
            };
            if (currentVersion) {
                if (!storedVersion) {
                    localStorage.setItem(versionKey, currentVersion);
                } else if (storedVersion !== currentVersion) {
                    showBanner();
                }
            }
            reloadBtn?.addEventListener('click', async () => {
                try {
                    localStorage.setItem(versionKey, currentVersion);
                    if ('serviceWorker' in navigator) {
                        const reg = await navigator.serviceWorker.getRegistration();
                        if (reg) await reg.unregister();
                    }
                } catch {
                }
                const u = new URL(window.location.href);
                if (currentVersion) u.searchParams.set('v', currentVersion);
                window.location.replace(u.toString());
            });
        });
    </script>
</body>

</html>
