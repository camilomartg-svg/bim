<!DOCTYPE html>
<html lang="es">

<head>
    <script>
        if (!sessionStorage.getItem('userAccount') && !localStorage.getItem('userAccount')) {
            window.location.replace('https://norabim.com/inse.html');
        }
    </script>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Selección de Empresa | nora CDE</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#171717",
                        "background-light": "#F2F2F2",
                        "text-light": "#111827",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Inter', 'sans-serif'] // We use Inter for a clean, premium look
                    },
                },
            },
        };
    </script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="icon" href="https://i.postimg.cc/W3trgjZX/FAVICON-NORA-NEGRO.png" type="image/png">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F4F4F4;
            color: #111;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* The custom cursor "DRAG" */
        #custom-cursor {
            pointer-events: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 70px;
            height: 70px;
            background-color: rgba(220, 220, 220, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            transform: translate(-50%, -50%);
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
            mix-blend-mode: multiply;
        }

        .card-hover:hover {
            transform: scale(0.98);
        }
        
        .card-image-wrapper {
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .card-hover:hover .card-image-wrapper {
            transform: scale(1.05);
        }
    </style>
</head>

<body class="min-h-screen w-full flex flex-col relative">

    <!-- Custom DRAG cursor -->
    <div id="custom-cursor">DRAG</div>



    <!-- Main Content -->
    <main class="flex-1 flex flex-col justify-center w-full px-8 relative z-0">
        
        <!-- Top Section: Title & Description -->
        <div class="flex flex-col md:flex-row justify-between items-end mb-8 w-full max-w-[95%] mx-auto gap-4">
            <div class="flex items-start">
                <h1 class="text-6xl md:text-8xl font-medium tracking-tighter leading-none" style="letter-spacing: -0.04em;">EMPRESAS</h1>
                <span id="company-count" class="text-lg font-medium ml-4 mt-2">(0)</span>
            </div>
            <div class="hidden md:block max-w-sm text-right">
                <p class="text-sm font-medium leading-tight text-gray-600">
                    Plataforma centralizada.<br>
                    Seleccione su espacio de trabajo corporativo para acceder a sus proyectos.
                </p>
            </div>
        </div>

        <!-- Horizontal Scroll Section -->
        <div id="scroll-container" class="w-full flex overflow-x-auto no-scrollbar pb-8 cursor-grab active:cursor-grabbing px-4 max-w-[95%] mx-auto">
            <div id="companies-list" class="flex gap-8 lg:gap-12 pl-4">
                <!-- Tarjetas inyectadas por JS -->
            </div>
        </div>
    </main>

    <!-- Footer (Oculto/Eliminado) -->
    <footer class="w-full px-8 py-6 z-10 mt-12">
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('scroll-container');
            const list = document.getElementById('companies-list');
            const countEl = document.getElementById('company-count');
            const cursor = document.getElementById('custom-cursor');

            // --- Cargar empresas ---
            const defaultCompanies = [
                { id: 'nora', name: 'nora CDE', location: 'Bogotá, Colombia', image: 'https://i.postimg.cc/fbwgkrDd/r-ciien.png', code: '001', configUrl: 'portal-config.json' }
            ];

            let companies = [];
            try {
                const res = await fetch('empresas.json');
                if(res.ok) {
                    companies = await res.json();
                } else {
                    companies = defaultCompanies;
                }
            } catch(e) {
                companies = defaultCompanies;
            }

            countEl.textContent = `(${companies.length})`;

            // --- Renderizar tarjetas ---
            list.innerHTML = companies.map(c => `
                <a href="home.html?empresa=${c.id}" class="card-hover flex-none w-[260px] md:w-[320px] lg:w-[360px] group transition-transform duration-500 block">
                    <!-- Metadata info -->
                    <div class="flex justify-between items-end mb-4 border-b border-gray-300 pb-2">
                        <div class="flex flex-col">
                            <span class="text-[9px] font-bold text-gray-400 mb-1">${c.code}</span>
                            <span class="text-xs font-bold uppercase tracking-wider text-gray-800">${c.name}</span>
                        </div>
                        <span class="text-[9px] font-semibold text-gray-500 uppercase tracking-widest text-right">${c.location}</span>
                    </div>
                    
                    <!-- Image -->
                    <div class="w-full aspect-[4/5] bg-gray-200 overflow-hidden relative">
                        <div class="w-full h-full card-image-wrapper">
                            <img src="${c.image}" alt="${c.name}" class="w-full h-full object-cover filter brightness-95 contrast-105" />
                        </div>
                    </div>
                </a>
            `).join('');

            // --- Drag to Scroll Logic ---
            let isDown = false;
            let startX;
            let scrollLeft;

            container.addEventListener('mousedown', (e) => {
                isDown = true;
                startX = e.pageX - container.offsetLeft;
                scrollLeft = container.scrollLeft;
            });
            container.addEventListener('mouseleave', () => {
                isDown = false;
                cursor.style.opacity = '0';
            });
            container.addEventListener('mouseup', () => {
                isDown = false;
            });
            container.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - container.offsetLeft;
                const walk = (x - startX) * 2; // scroll-fast
                container.scrollLeft = scrollLeft - walk;
            });

            // --- Custom Cursor Logic ---
            document.addEventListener('mousemove', (e) => {
                // Check if hovering over scroll area
                const rect = container.getBoundingClientRect();
                const isHoveringContainer = (
                    e.clientY >= rect.top &&
                    e.clientY <= rect.bottom
                );

                if (isHoveringContainer) {
                    cursor.style.opacity = '1';
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                } else {
                    cursor.style.opacity = '0';
                }
            });
            
            // Hide custom cursor when hovering links so it doesn't block clicks
            const links = document.querySelectorAll('.card-hover');
            links.forEach(l => {
                l.addEventListener('mouseenter', () => cursor.style.opacity = '0');
                l.addEventListener('mouseleave', () => cursor.style.opacity = '1');
            });
        });
    </script>
</body>

</html>
