<!doctype html>
<html lang="en">
  <head>
    <script>
        if (!sessionStorage.getItem('userAccount') && !localStorage.getItem('userAccount')) {
            window.location.replace('https://norabim.com/inse.html');
        }
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2b2b2b" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./status-pba-favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="./status-pba-192.png" />
    <meta name="x-app-version" data-app="status" content="20260527-03" />
    <style>
      #update-banner{position:fixed;top:0;left:0;right:0;z-index:9999;display:none}
      #update-banner .inner{margin:0 auto;max-width:980px;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 14px;background:#111827;color:#fff;font:600 14px/1.2 system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;box-shadow:0 8px 24px rgba(0,0,0,.18)}
      #update-banner button{cursor:pointer;border:0;border-radius:8px;background:#fff;color:#111827;font-weight:900;letter-spacing:.12em;text-transform:uppercase;font-size:11px;padding:10px 12px}
    </style>
    <title>STATUS</title>
  </head>
  <body>
    <div id="update-banner"><div class="inner"><div>Hay una nueva versión disponible.</div><button id="update-reload" type="button">Actualizar</button></div></div>
    <div id="root"></div>
    <script>
      (function () {
        try {
          var meta = document.querySelector('meta[name="x-app-version"]');
          var appId = meta && meta.getAttribute('data-app') || 'status';
          var version = meta && meta.getAttribute('content') || '';
          var key = appId + ':appVersion';
          var stored = localStorage.getItem(key) || '';
          var banner = document.getElementById('update-banner');
          var btn = document.getElementById('update-reload');
          if (version) {
            if (!stored) localStorage.setItem(key, version);
            else if (stored !== version && banner) banner.style.display = 'block';
          }
          if (btn) {
            btn.addEventListener('click', function () {
              try { localStorage.setItem(key, version); } catch (e) {}
              try {
                if ('serviceWorker' in navigator) {
                  navigator.serviceWorker.getRegistration().then(function (reg) {
                    if (reg && reg.waiting) {
                      reg.waiting.postMessage({ type: 'SKIP_WAITING' });
                    }
                    if (reg) {
                      reg.update().finally(function () {
                        var u = new URL(location.href);
                        if (version) u.searchParams.set('v', version);
                        location.replace(u.toString());
                      });
                    } else {
                      var u2 = new URL(location.href);
                      if (version) u2.searchParams.set('v', version);
                      location.replace(u2.toString());
                    }
                  });
                } else {
                  var u3 = new URL(location.href);
                  if (version) u3.searchParams.set('v', version);
                  location.replace(u3.toString());
                }
              } catch (e) {
                location.reload();
              }
            });
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  
    <!-- VIEWER LOGO INJECT START -->
    <script>
        (async function() {
            try {
                const logoImg = document.getElementById('logo-img');
                if (!logoImg) return;
                
                const metaVersion = document.querySelector('meta[name="x-app-version"]');
                const currentVersion = metaVersion?.getAttribute('content') || Date.now().toString();
                
                let config = null;
                try {
                    const response = await fetch(`../portal-config.json?v=${encodeURIComponent(currentVersion)}`, { cache: 'no-store' });
                    if (response.ok) config = await response.json();
                } catch (e) {}

                if (!config) {
                    const draft = localStorage.getItem('portal:pba-config-draft:v2');
                    if (draft) config = JSON.parse(draft);
                }

                if (!config) return;

                const params = new URLSearchParams(window.location.search);
                const projectSlug = params.get('project');
                
                // Fallback a los logos del portal
                let lightLogo = config.portal?.logoLight || 'https://i.postimg.cc/L4r0gSvV/LOGO-TEXTO-NORA-NEGRO.png';
                let darkLogo = config.portal?.logoDark || 'https://i.postimg.cc/FFfBKzb8/LOGO-TEXTO-NORA-BLANCO.png';
                
                if (projectSlug && config.projects) {
                    const proj = config.projects.find(p => p.slug === projectSlug);
                    if (proj && proj.landing) {
                        // Priorizar viewerLogo (el nuevo campo), sino usar portalLogo
                        if (proj.landing.viewerLogoLight) lightLogo = proj.landing.viewerLogoLight;
                        else if (proj.landing.portalLogoLight) lightLogo = proj.landing.portalLogoLight;
                        
                        if (proj.landing.viewerLogoDark) darkLogo = proj.landing.viewerLogoDark;
                        else if (proj.landing.portalLogoDark) darkLogo = proj.landing.portalLogoDark;
                    }
                }
                
                const updateLogo = () => {
                    const isDark = document.body.classList.contains('dark-mode') || document.documentElement.classList.contains('dark');
                    const desiredSrc = isDark ? darkLogo : lightLogo;
                    if (logoImg.getAttribute('src') !== desiredSrc) {
                        logoImg.src = desiredSrc;
                    }
                };

                const observer = new MutationObserver(() => updateLogo());
                observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
                observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
                
                const origSetAttribute = logoImg.setAttribute.bind(logoImg);
                logoImg.setAttribute = function(name, value) {
                    if (name === 'src') {
                        const isDark = document.body.classList.contains('dark-mode') || document.documentElement.classList.contains('dark');
                        const desiredSrc = isDark ? darkLogo : lightLogo;
                        if (value !== desiredSrc) {
                            origSetAttribute('src', desiredSrc);
                            return;
                        }
                    }
                    origSetAttribute(name, value);
                };

                updateLogo();
            } catch (e) {
                console.warn('Error loading dynamic logo', e);
            }
        })();
    </script>
    <!-- VIEWER LOGO INJECT END -->

</body>
</html>
