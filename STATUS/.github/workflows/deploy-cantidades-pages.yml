name: Deploy CANTIDADES to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "CANTIDADES/**"
      - ".github/workflows/deploy-cantidades-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: CANTIDADES/package-lock.json

      - name: Install
        working-directory: CANTIDADES
        run: npm ci

      - name: Lint (Typecheck)
        working-directory: CANTIDADES
        run: npm run lint

      - name: Build
        working-directory: CANTIDADES
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: CANTIDADES/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
